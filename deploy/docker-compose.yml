services:
  iris:
    image: iris-app:latest
    build:
      context: ${IRIS_BUILD_CONTEXT:-..}
      dockerfile: ${IRIS_DOCKERFILE:-deploy/Dockerfile}
      args:
        IRIS_ENABLE_YOLO: ${IRIS_ENABLE_YOLO:-1}
        IRIS_ENABLE_DEEPFACE: ${IRIS_ENABLE_DEEPFACE:-0}
    ports:
      - "8765:8765"
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: ["streamlit", "run", "src/run_dashboard.py", "--server.address=0.0.0.0", "--server.port=8765", "--browser.serverAddress=localhost"]

  iris-scheduler:
    image: iris-app:latest
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - IRIS_SCHEDULER_POLL_SECONDS=${IRIS_SCHEDULER_POLL_SECONDS:-10}
      - YOLO_ENABLED=${YOLO_ENABLED:-1}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    command:
      [
        "python",
        "scripts/scheduler_worker.py",
        "--db",
        "/app/data/store_registry.db",
        "--root",
        "/app/data/stores",
        "--out",
        "/app/data/exports/current",
        "--employee-assets-root",
        "/app/data/employee_assets",
        "--poll-seconds",
        "${IRIS_SCHEDULER_POLL_SECONDS:-10}"
      ]

  iris-gpt-scheduler:
    image: iris-app:latest
    profiles: ["gpt"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GPT_VISION_ENABLED=${GPT_VISION_ENABLED:-0}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      - GPT_VISION_MAX_IMAGES=${GPT_VISION_MAX_IMAGES:-100}
      - GPT_TEST_STORE_ID=${GPT_TEST_STORE_ID:-TEST_STORE_D07}
      - GPT_TEST_GDRIVE_URL=${GPT_TEST_GDRIVE_URL:-}
      - GPT_TEST_GROUND_TRUTH=${GPT_TEST_GROUND_TRUTH:-/app/data/exports/gpt_eval/TEST_STORE_D07/ground_truth_template.csv}
      - GPT_TEST_OUTPUT_ROOT=${GPT_TEST_OUTPUT_ROOT:-/app/data/exports/gpt_eval}
      - GPT_TEST_DATA_ROOT=${GPT_TEST_DATA_ROOT:-/app/data/test_stores}
      - GPT_DAILY_RUN_AT=${GPT_DAILY_RUN_AT:-02:30}
      - GPT_TZ=${GPT_TZ:-Asia/Kolkata}
      - GPT_SAVE_JSON=${GPT_SAVE_JSON:-1}
      - GPT_SKIP_SYNC=${GPT_SKIP_SYNC:-0}
      - IRIS_GPT_SCHEDULER_POLL_SECONDS=${IRIS_GPT_SCHEDULER_POLL_SECONDS:-20}
    command:
      [
        "python",
        "scripts/gpt_eval_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--poll-seconds",
        "${IRIS_GPT_SCHEDULER_POLL_SECONDS:-20}"
      ]

  iris-yolo-relevance-scheduler:
    image: iris-app:latest
    profiles: ["stage1"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - YOLO_RELEVANCE_ENABLED=${YOLO_RELEVANCE_ENABLED:-1}
      - YOLO_RELEVANCE_DAILY_RUN_AT=${YOLO_RELEVANCE_DAILY_RUN_AT:-15:00}
      - YOLO_RELEVANCE_TZ=${YOLO_RELEVANCE_TZ:-Asia/Kolkata}
      - YOLO_RELEVANCE_ROOT=${YOLO_RELEVANCE_ROOT:-/app/data/test_stores}
      - YOLO_RELEVANCE_OUT_ROOT=${YOLO_RELEVANCE_OUT_ROOT:-/app/data/exports/current/stage1_relevance}
      - YOLO_RELEVANCE_STORE_ID=${YOLO_RELEVANCE_STORE_ID:-TEST_STORE_D07}
      - YOLO_RELEVANCE_CONF=${YOLO_RELEVANCE_CONF:-0.18}
      - YOLO_RELEVANCE_MAX_IMAGES=${YOLO_RELEVANCE_MAX_IMAGES:-0}
      - YOLO_RELEVANCE_ALLOW_FALLBACK=${YOLO_RELEVANCE_ALLOW_FALLBACK:-0}
      - YOLO_RELEVANCE_GZIP_EXPORTS=${YOLO_RELEVANCE_GZIP_EXPORTS:-1}
      - YOLO_RELEVANCE_DROP_PLAIN_CSV=${YOLO_RELEVANCE_DROP_PLAIN_CSV:-1}
      - IRIS_STAGE1_SCHEDULER_POLL_SECONDS=${IRIS_STAGE1_SCHEDULER_POLL_SECONDS:-20}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    command:
      [
        "python",
        "scripts/yolo_relevance_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--poll-seconds",
        "${IRIS_STAGE1_SCHEDULER_POLL_SECONDS:-20}"
      ]


  iris-onfly-scheduler:
    image: iris-app:latest
    profiles: ["onfly"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GPT_VISION_ENABLED=${GPT_VISION_ENABLED:-0}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      - ONFLY_ENABLED=${ONFLY_ENABLED:-1}
      - ONFLY_STORE_ID=${ONFLY_STORE_ID:-TEST_STORE_D07}
      - ONFLY_SOURCE_URL=${ONFLY_SOURCE_URL:-}
      - ONFLY_OUT_DIR=${ONFLY_OUT_DIR:-/app/data/exports/current/onfly}
      - ONFLY_HOURLY_MINUTES=${ONFLY_HOURLY_MINUTES:-60}
      - ONFLY_NIGHTLY_RUN_AT=${ONFLY_NIGHTLY_RUN_AT:-03:00}
      - ONFLY_TZ=${ONFLY_TZ:-Asia/Kolkata}
      - ONFLY_MAX_IMAGES=${ONFLY_MAX_IMAGES:-100}
      - ONFLY_PIPELINE_VERSION=${ONFLY_PIPELINE_VERSION:-onfly_v1}
      - ONFLY_DETECTOR=${ONFLY_DETECTOR:-yolo}
      - ONFLY_CONF=${ONFLY_CONF:-0.18}
      - ONFLY_ALLOW_DETECTOR_FALLBACK=${ONFLY_ALLOW_DETECTOR_FALLBACK:-0}
      - IRIS_ONFLY_POLL_SECONDS=${IRIS_ONFLY_POLL_SECONDS:-30}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    command:
      [
        "python",
        "scripts/onfly_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--poll-seconds",
        "${IRIS_ONFLY_POLL_SECONDS:-30}"
      ]

  iris-sync:
    image: iris-app:latest
    profiles: ["sync"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - IRIS_SYNC_STORE_ID=${IRIS_SYNC_STORE_ID:-BLRJAY}
      - IRIS_SYNC_RUN_AT=${IRIS_SYNC_RUN_AT:-06:00}
      - IRIS_SYNC_TZ=${IRIS_SYNC_TZ:-Asia/Kolkata}
      - IRIS_SYNC_WORKERS=${IRIS_SYNC_WORKERS:-6}
    command:
      [
        "python",
        "scripts/drive_delta_sync_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--data-root",
        "/app/data/stores",
        "--store-id",
        "${IRIS_SYNC_STORE_ID:-BLRJAY}",
        "--run-at",
        "${IRIS_SYNC_RUN_AT:-06:00}",
        "--tz",
        "${IRIS_SYNC_TZ:-Asia/Kolkata}",
        "--workers",
        "${IRIS_SYNC_WORKERS:-6}"
      ]

  # ── New Phase 1 services: React + FastAPI + Celery + Redis ─────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data

  iris-api:
    build:
      context: ${IRIS_BUILD_CONTEXT:-..}
      dockerfile: backend/Dockerfile
    ports:
      - "8766:8766"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app:/app/src
      - IRIS_DB_PATH=/app/data/store_registry.db
      - IRIS_DATA_ROOT=/app/data
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${IRIS_JWT_SECRET:-change_me_before_deploy}
      - STORE_ID=${ONFLY_STORE_ID:-TEST_STORE_D07}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      - ONFLY_SOURCE_URL=${ONFLY_SOURCE_URL:-}
      - YOLO_CONF=${ONFLY_CONF:-0.18}
      - MAX_IMAGES=${ONFLY_MAX_IMAGES:-100}
      - OMP_NUM_THREADS=1
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    depends_on:
      - redis

  iris-celery-worker:
    build:
      context: ${IRIS_BUILD_CONTEXT:-..}
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.celery_app.worker.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app:/app/src
      - IRIS_DB_PATH=/app/data/store_registry.db
      - IRIS_DATA_ROOT=/app/data
      - REDIS_URL=redis://redis:6379/0
      - STORE_ID=${ONFLY_STORE_ID:-TEST_STORE_D07}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      - ONFLY_SOURCE_URL=${ONFLY_SOURCE_URL:-}
      - YOLO_CONF=${ONFLY_CONF:-0.18}
      - MAX_IMAGES=${ONFLY_MAX_IMAGES:-100}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    depends_on:
      - redis

  iris-celery-beat:
    build:
      context: ${IRIS_BUILD_CONTEXT:-..}
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.celery_app.worker.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler --schedule /app/celerybeat-schedule
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app:/app/src
      - IRIS_DB_PATH=/app/data/store_registry.db
      - REDIS_URL=redis://redis:6379/0
      - STORE_ID=${ONFLY_STORE_ID:-TEST_STORE_D07}
      - TZ=Asia/Kolkata
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
      - celery_beat_data:/app
    depends_on:
      - redis

volumes:
  redis_data:
  celery_beat_data:
