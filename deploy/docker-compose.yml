services:
  iris:
    image: iris-app:latest
    build:
      context: ${IRIS_BUILD_CONTEXT:-..}
      dockerfile: ${IRIS_DOCKERFILE:-deploy/Dockerfile}
      args:
        IRIS_ENABLE_YOLO: ${IRIS_ENABLE_YOLO:-1}
        IRIS_ENABLE_DEEPFACE: ${IRIS_ENABLE_DEEPFACE:-0}
    ports:
      - "8765:8765"
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: ["streamlit", "run", "src/run_dashboard.py", "--server.address=0.0.0.0", "--server.port=8765", "--browser.serverAddress=localhost"]

  iris-scheduler:
    image: iris-app:latest
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - IRIS_SCHEDULER_POLL_SECONDS=${IRIS_SCHEDULER_POLL_SECONDS:-10}
      - YOLO_ENABLED=${YOLO_ENABLED:-1}
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    command:
      [
        "python",
        "scripts/scheduler_worker.py",
        "--db",
        "/app/data/store_registry.db",
        "--root",
        "/app/data/stores",
        "--out",
        "/app/data/exports/current",
        "--employee-assets-root",
        "/app/data/employee_assets",
        "--poll-seconds",
        "${IRIS_SCHEDULER_POLL_SECONDS:-10}"
      ]

  iris-gpt-scheduler:
    image: iris-app:latest
    profiles: ["gpt"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GPT_VISION_ENABLED=${GPT_VISION_ENABLED:-0}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      - GPT_VISION_MAX_IMAGES=${GPT_VISION_MAX_IMAGES:-100}
      - GPT_TEST_STORE_ID=${GPT_TEST_STORE_ID:-TEST_STORE_D07}
      - GPT_TEST_GDRIVE_URL=${GPT_TEST_GDRIVE_URL:-}
      - GPT_TEST_GROUND_TRUTH=${GPT_TEST_GROUND_TRUTH:-/app/data/exports/gpt_eval/TEST_STORE_D07/ground_truth_template.csv}
      - GPT_TEST_OUTPUT_ROOT=${GPT_TEST_OUTPUT_ROOT:-/app/data/exports/gpt_eval}
      - GPT_TEST_DATA_ROOT=${GPT_TEST_DATA_ROOT:-/app/data/test_stores}
      - GPT_DAILY_RUN_AT=${GPT_DAILY_RUN_AT:-02:30}
      - GPT_TZ=${GPT_TZ:-Asia/Kolkata}
      - GPT_SAVE_JSON=${GPT_SAVE_JSON:-1}
      - GPT_SKIP_SYNC=${GPT_SKIP_SYNC:-0}
      - IRIS_GPT_SCHEDULER_POLL_SECONDS=${IRIS_GPT_SCHEDULER_POLL_SECONDS:-20}
    command:
      [
        "python",
        "scripts/gpt_eval_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--poll-seconds",
        "${IRIS_GPT_SCHEDULER_POLL_SECONDS:-20}"
      ]

  iris-sync:
    image: iris-app:latest
    profiles: ["sync"]
    restart: unless-stopped
    volumes:
      - ${IRIS_DATA_DIR:-../data}:/app/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - IRIS_SYNC_STORE_ID=${IRIS_SYNC_STORE_ID:-BLRJAY}
      - IRIS_SYNC_RUN_AT=${IRIS_SYNC_RUN_AT:-06:00}
      - IRIS_SYNC_TZ=${IRIS_SYNC_TZ:-Asia/Kolkata}
      - IRIS_SYNC_WORKERS=${IRIS_SYNC_WORKERS:-6}
    command:
      [
        "python",
        "scripts/drive_delta_sync_scheduler.py",
        "--db",
        "/app/data/store_registry.db",
        "--data-root",
        "/app/data/stores",
        "--store-id",
        "${IRIS_SYNC_STORE_ID:-BLRJAY}",
        "--run-at",
        "${IRIS_SYNC_RUN_AT:-06:00}",
        "--tz",
        "${IRIS_SYNC_TZ:-Asia/Kolkata}",
        "--workers",
        "${IRIS_SYNC_WORKERS:-6}"
      ]
